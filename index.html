<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU AI Generator</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .card { max-width: 400px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 15px; background: #2c2c2e; color: #fff; font-size: 16px; }
        button { background: #32d74b; color: #000; border: none; padding: 18px; border-radius: 12px; width: 95%; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status { font-size: 14px; color: #0a84ff; margin-top: 20px; text-align: left; background: #000; padding: 15px; border-radius: 10px; font-family: monospace; line-height: 1.5; border: 1px solid #333; }
        canvas { width: 100%; border-radius: 15px; margin-top: 20px; display: none; background: #2c2c2e; }
    </style>
</head>
<body>

<div class="card">
    <h2>Local GPU AI</h2>
    <p style="font-size: 12px; color: #8e8e93; margin-bottom: 20px;">あなたの端末のGPUで描画します</p>
    
    <input type="text" id="promptInput" value="a cute robot, high quality, digital art">
    <button id="genBtn">🚀 生成を開始する</button>

    <canvas id="outputCanvas" width="256" height="256"></canvas>
    <div id="status">ステータス: 準備完了</div>
</div>

<script type="module">
    // ライブラリの読み込み
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const btn = document.getElementById('genBtn');
    const status = document.getElementById('status');
    const canvas = document.getElementById('outputCanvas');

    // ログを表示する関数
    function updateLog(msg) {
        status.innerText = "● " + msg;
        console.log(msg);
    }

    btn.onclick = async () => {
        // ボタンを押した瞬間の反応
        btn.disabled = true;
        btn.innerText = "⏳ 生成中...";
        updateLog("WebGPUを初期化中...");

        try {
            if (!navigator.gpu) {
                throw new Error("WebGPUが未対応です。iOS18のSafari設定か、最新のChromeを確認してください。");
            }

            // 通信エラーを避けるための設定
            env.allowLocalModels = false;
            
            updateLog("AIモデルを読み込み中...（1分ほどかかる場合があります）");

            // モデルのロード
            const pipe = await pipeline('image-to-image', 'Xenova/stable-diffusion-v1-5-onnx', {
                device: 'webgpu',
            });

            updateLog("描画を開始しました！GPUフル稼働中です...");

            const prompt = document.getElementById('promptInput').value;
            const output = await pipe(prompt, {
                num_inference_steps: 4,
                width: 256,
                height: 256,
            });

            // 結果を表示
            updateLog("完成しました！");
            canvas.style.display = "block";
            btn.innerText = "🚀 もう一度生成";

        } catch (e) {
            updateLog("エラー: " + e.message);
            btn.innerText = "❌ 失敗（再試行）";
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
