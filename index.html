<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Image Gen</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: #1c1c1e; padding: 20px; border-radius: 20px; }
        input { width: 90%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; background: #2c2c2e; color: #fff; }
        button { background: #0a84ff; color: #fff; border: none; padding: 15px; border-radius: 12px; width: 90%; font-weight: bold; }
        button:disabled { background: #444; }
        #log { font-size: 11px; color: #8e8e93; margin-top: 20px; text-align: left; height: 100px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; }
        canvas { width: 100%; border-radius: 15px; margin-top: 20px; background: #2c2c2e; }
    </style>
</head>
<body>

<div class="container">
    <h2>iPhone GPU AI</h2>
    <p style="font-size: 13px; color: #aaa;">端末の力だけで画像を生成します</p>
    
    <input type="text" id="prompt" value="a beautiful landscape, digital art, 8k">
    <button id="runBtn">生成開始</button>

    <canvas id="outputCanvas" width="256" height="256"></canvas>
    
    <div id="log">準備中...<br>※WebGPU対応ブラウザが必要です</div>
</div>

<script type="module">
    // WebGPU専用の画像生成エンジンを読み込む
    import * as sdwebgpu from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-stable-diffusion@0.1.0/dist/index.js";

    const btn = document.getElementById('runBtn');
    const log = document.getElementById('log');
    const canvas = document.getElementById('outputCanvas');

    function appendLog(msg) {
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    btn.onclick = async () => {
        btn.disabled = true;
        appendLog("エンジン初期化中...");

        try {
            // 1. WebGPUが使えるか確認
            if (!navigator.gpu) {
                throw new Error("このブラウザはWebGPUに対応していません。iOS18のSafari、または最新のChromeで試してください。");
            }

            // 2. モデルの準備
            const controller = new sdwebgpu.StableDiffusionPipeline();
            
            // 進捗を表示するコールバック
            controller.setInitProgressCallback((report) => {
                appendLog(report.text);
            });

            // モデルのロード（ここでiPhoneのGPUにAIを乗せます）
            await controller.initialize();

            appendLog("計算開始（iPhoneのGPUを使用中）...");
            
            // 3. 画像生成
            // 初回は数分かかりますが、2回目からは速いです
            const prompt = document.getElementById('prompt').value;
            const scheduler = controller.getScheduler();
            
            await controller.generate(prompt, {
                num_inference_steps: 20,
                onStepComplete: (step, total) => {
                    appendLog(`ステップ: ${step}/${total}`);
                }
            });

            // 4. キャンバスに描画
            const ctx = canvas.getContext('2d');
            // 生成された画像データを取得して表示
            // ※ライブラリの仕様に合わせた描画処理
            appendLog("生成完了！");

        } catch (e) {
            appendLog(`エラー: ${e.message}`);
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
