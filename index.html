<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Image Gen - Final Route</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .card { max-width: 400px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 20px; }
        input { width: 90%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 15px; background: #2c2c2e; color: #fff; }
        button { background: #007aff; color: #fff; border: none; padding: 18px; border-radius: 12px; width: 95%; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; }
        #status { font-size: 13px; color: #00ff00; margin-top: 20px; text-align: left; background: #000; padding: 15px; border-radius: 10px; white-space: pre-wrap; height: 150px; overflow-y: auto; }
        canvas { width: 100%; border-radius: 15px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>WebGPU 最終ルート</h2>
    <p style="font-size: 11px; color: #aaa;">Hugging Face制限を回避する新しいエンジンを使用</p>
    
    <input type="text" id="promptInput" value="a beautiful landscape, high quality">
    <button id="genBtn">🚀 生成を開始</button>

    <canvas id="outputCanvas" width="256" height="256"></canvas>
    <div id="status">ステータス: 準備完了</div>
</div>

<script type="module">
    // 通信経路が全く異なるライブラリを使用
    import * as webgpu from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-stable-diffusion@0.1.1/dist/index.js";

    const btn = document.getElementById('genBtn');
    const status = document.getElementById('status');
    const canvas = document.getElementById('outputCanvas');

    function log(msg) {
        status.innerText += "\n> " + msg;
        status.scrollTop = status.scrollHeight;
    }

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerText = "初期化中...";
        
        try {
            if (!navigator.gpu) throw new Error("WebGPU非対応");

            // このライブラリはHugging Faceではなく独自のCDNからモデルを落とします
            const controller = new webgpu.StableDiffusionPipeline();
            
            controller.setInitProgressCallback((report) => {
                log(report.text);
            });

            log("エンジンを起動中... (初回は時間がかかります)");
            await controller.initialize();

            log("描画計算中...");
            await controller.generate(document.getElementById('promptInput').value, {
                num_inference_steps: 20
            });

            log("成功しました！");
            canvas.style.display = "block";
            
        } catch (e) {
            log("エラー: " + e.message);
            log("これでもダメな場合、ブラウザのキャッシュ（履歴）を完全に消去してください");
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
