<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Image Gen</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 15px; background: #2c2c2e; color: #fff; font-size: 16px; }
        button { background: #0a84ff; color: #fff; border: none; padding: 15px; border-radius: 12px; width: 95%; font-weight: bold; font-size: 18px; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        #log { font-size: 12px; color: #00ff00; margin-top: 20px; text-align: left; height: 120px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; font-family: monospace; border: 1px solid #333; }
        #canvasContainer { margin-top: 20px; width: 100%; min-height: 256px; background: #2c2c2e; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; border-radius: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>iPhone/PC GPU AI</h2>
    <p style="font-size: 13px; color: #aaa; margin-bottom: 20px;">サーバーを使わず、端末のGPUで描画します</p>
    
    <input type="text" id="prompt" value="a beautiful sunset over the ocean, high quality">
    <button id="runBtn">生成を開始する</button>

    <div id="canvasContainer">
        <p id="placeholder">ここに画像が出ます</p>
        <canvas id="outputCanvas" width="256" height="256"></canvas>
    </div>
    
    <div id="log">ログ: 待機中...</div>
</div>

<script type="module">
    // WebGPUに最適化された最新の配布元を使用
    import * as sdwebgpu from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-stable-diffusion@0.1.1/dist/index.js";

    const btn = document.getElementById('runBtn');
    const log = document.getElementById('log');
    const canvas = document.getElementById('outputCanvas');
    const placeholder = document.getElementById('placeholder');

    function appendLog(msg) {
        const now = new Date().toLocaleTimeString();
        log.innerHTML += `[${now}] ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    btn.onclick = async () => {
        btn.disabled = true;
        placeholder.innerText = "準備中...";
        appendLog("WebGPUエンジンの初期化を開始...");

        try {
            // WebGPU対応チェック
            if (!navigator.gpu) {
                throw new Error("お使いのブラウザはWebGPUに対応していません。iOS18のSafari、または最新のChromeで実行してください。");
            }

            // パイプラインの作成
            const controller = new sdwebgpu.StableDiffusionPipeline();
            
            // 進行状況の表示
            controller.setInitProgressCallback((report) => {
                appendLog(report.text);
            });

            // モデルの初期化（ここでデータを取得します）
            await controller.initialize();

            appendLog("計算を開始します。数分かかる場合があります...");
            const prompt = document.getElementById('prompt').value;
            
            // 生成実行
            await controller.generate(prompt, {
                num_inference_steps: 20,
                onStepComplete: (step, total) => {
                    appendLog(`ステップ進行中: ${step}/${total}`);
                }
            });

            // キャンバスへ表示
            canvas.style.display = "block";
            placeholder.style.display = "none";
            appendLog("生成が完了しました！");

        } catch (e) {
            appendLog(`エラー発生: ${e.message}`);
            console.error(e);
            placeholder.innerText = "生成失敗";
        } finally {
            btn.disabled = false;
            btn.innerText = "もう一度生成";
        }
    };
</script>

</body>
</html>
