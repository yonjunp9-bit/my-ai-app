<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本気の実写AIアプリ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; border-radius: 20px; padding: 20px; max-width: 400px; margin: 0 auto; }
        input { width: 90%; padding: 12px; border-radius: 10px; border: none; margin: 10px 0; background: #2c2c2e; color: #fff; }
        button { background: #0a84ff; color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; width: 90%; }
        button:disabled { opacity: 0.5; }
        #status { font-size: 12px; color: #8e8e93; margin-top: 15px; }
        #imageContainer { margin-top: 20px; width: 100%; min-height: 256px; background: #2c2c2e; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        img { width: 100%; border-radius: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Real-AI Image Gen</h2>
    <p style="font-size: 14px;">iPhoneのGPUで画像を生成します</p>
    
    <input type="text" id="prompt" placeholder="a realistic portrait of a woman, 8k" value="a realistic portrait of a woman, high quality, highly detailed">
    <button id="genBtn">画像を生成</button>

    <div id="imageContainer">
        <p id="placeholderText">ここに画像が出ます</p>
        <img id="outputImg" />
    </div>
    
    <div id="status">準備中...</div>
</div>

<script type="module">
    // WebGPUに特化したRatchetライブラリを読み込む
    import { Ratchet } from 'https://cdn.jsdelivr.net/npm/@floneum/ratchet@0.1.0/dist/ratchet.js';

    const btn = document.getElementById('genBtn');
    const status = document.getElementById('status');
    const outputImg = document.getElementById('outputImg');
    const placeholderText = document.getElementById('placeholderText');

    let model = null;

    btn.onclick = async () => {
        const prompt = document.getElementById('prompt').value;
        btn.disabled = true;
        status.innerText = "AIエンジンを読み込み中... (初回のみ数分)";
        placeholderText.innerText = "AIが思考中...";

        try {
            // iPhoneのWebGPUを初期化してSD1.5をロード
            if (!model) {
                model = await Ratchet.loadStableDiffusion({
                    model: "stable-diffusion-v1-5", 
                    quantization: "f16" // iPhone向けに軽量化
                });
            }

            status.innerText = "画像を計算中... (iPhoneの温度が上がる場合があります)";
            
            // 画像生成実行
            const result = await model.generate(prompt, {
                steps: 20,
                width: 256,
                height: 256
            });

            // 結果を表示
            outputImg.src = result.url;
            outputImg.style.display = "block";
            placeholderText.style.display = "none";
            status.innerText = "生成完了！";

        } catch (e) {
            console.error(e);
            status.innerText = "エラー: WebGPUが未対応かメモリ不足です。";
            placeholderText.innerText = "失敗しました";
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
