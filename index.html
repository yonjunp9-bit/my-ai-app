<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自作・画像生成AIアプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        #container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 20px; font-size: 14px; color: #666; }
        #resultImg { width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="container">
    <h2>画像生成AI (SD1.5)</h2>
    <p>英語で作りたい画像を入力してね</p>
    <input type="text" id="prompt" placeholder="a realistic photo of a cat, high quality" value="a realistic photo of a cat">
    <br>
    <button id="generateBtn">画像を生成する</button>
    
    <div id="loader" class="loader"></div>
    <p id="status">初回はAIの準備に時間がかかります（約1GB）<br>Wi-Fi環境で実行してください。</p>
    <img id="resultImg" alt="生成された画像">
</div>

<script type="module">
    // Transformers.jsを使用して画像生成モデル(SD1.5)を呼び出す
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';

    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const promptInput = document.getElementById('prompt');
    const resultImg = document.getElementById('resultImg');
    const loader = document.getElementById('loader');

    let generator = null;

    btn.onclick = async () => {
        const prompt = promptInput.value;
        if (!prompt) return alert("言葉を入力してください");

        btn.disabled = true;
        loader.style.display = "block";
        resultImg.style.display = "none";
        status.innerText = "AIエンジンを起動中... (初回のみ数分かかります)";

        try {
            // 画像生成パイプラインの作成
            // 初回実行時にHugging FaceからモデルをDLし、ブラウザに保存します
            if (!generator) {
                generator = await pipeline('stable-diffusion', 'Xenova/stable-diffusion-v1-5', {
                    device: 'webgpu', // iPhoneのGPUを使用
                });
            }

            status.innerText = "画像を生成中... iPhoneが計算しています...";
            
            // 画像生成の実行
            const output = await generator(prompt, {
                num_inference_steps: 20, // 計算回数（多いほど綺麗、長い）
                width: 256,  // iPhoneのメモリを考慮してまずは小さめでテスト
                height: 256,
            });

            // 生成された画像を表示
            const canvas = document.createElement('canvas');
            canvas.width = output.width;
            canvas.height = output.height;
            const ctx = canvas.getContext('2d');
            ctx.putImageData(output, 0, 0);
            
            resultImg.src = canvas.toDataURL();
            resultImg.style.display = "block";
            status.innerText = "生成完了！";

        } catch (e) {
            console.error(e);
            status.innerText = "エラーが発生しました。iPhoneのメモリ不足かもしれません。\n" + e.message;
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    };
</script>

</body>
</html>
