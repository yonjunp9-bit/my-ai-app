<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診断モード</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        button { background: #007bff; color: white; border: none; padding: 20px 40px; border-radius: 10px; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>動作診断プログラム</h2>
    <p>このボタンが反応するかテストします</p>
    
    <button id="testBtn">テストボタン</button>
    <p id="status">読み込み中...</p>
</div>

<script>
    // ページが読み込まれたら実行
    window.onload = function() {
        const btn = document.getElementById('testBtn');
        const status = document.getElementById('status');

        status.innerText = "準備完了！ボタンを押してください。";

        btn.onclick = function() {
            // ボタンが押されたら色と文字を変える
            btn.style.backgroundColor = "#28a745"; // 緑色
            btn.innerText = "✅ 反応あり！";
            status.innerText = "プログラムは正常に動いています。";
            console.log("Button clicked successfully!");
        };
    };
</script>

</body>
</html>
